<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRChat BPlayer Proxy - 登录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23fb7299'/><text x='16' y='23' text-anchor='middle' fill='white' font-size='20' font-weight='bold' font-family='Arial'>B</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { background: #16213e; border-radius: 16px; padding: 48px; max-width: 400px; width: 90%; box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .login-container h1 { font-size: 28px; margin-bottom: 4px; color: #fb7299; text-align: center; }
        .login-container .subtitle { color: #888; font-size: 14px; margin-bottom: 32px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; color: #888; margin-bottom: 8px; }
        .form-group input { width: 100%; padding: 12px 16px; background: #0f3460; border: 1px solid #2a2a4a; border-radius: 8px; color: #e0e0e0; font-size: 15px; font-family: inherit; transition: border-color 0.2s; }
        .form-group input:focus { outline: none; border-color: #fb7299; }
        .error-box { background: #4a2a2a; border: 1px solid #c62828; color: #ef5350; padding: 12px 16px; border-radius: 8px; font-size: 14px; margin-bottom: 20px; text-align: center; }
        .btn-login { width: 100%; padding: 12px; background: #fb7299; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; font-family: inherit; }
        .btn-login:hover { background: #e06080; }
        .btn-login:active { transform: scale(0.98); }
        .hint { color: #666; font-size: 12px; text-align: center; margin-top: 20px; }
        .hint a { color: #fb7299; text-decoration: none; }
        .hint a:hover { text-decoration: underline; }
        .logo-area { text-align: center; margin-bottom: 8px; }
        .logo-icon { width: 48px; height: 48px; background: #fb7299; border-radius: 12px; display: inline-flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: white; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .login-container { animation: fadeIn 0.5s ease; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-area">
            <div class="logo-icon">B</div>
        </div>
        <h1>VRChat BPlayer Proxy</h1>
        <p class="subtitle">Web 管理面板登录</p>

        {% if error %}
        <div class="error-box">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/login">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn-login">登 录</button>
        </form>

        <p class="hint">默认账号: <strong>admin</strong> / <strong>password</strong></p>
        <p class="hint">首次登录后请修改默认密码</p>
        <p class="hint"><a href="/qr-login">使用 Bilibili 扫码登录</a></p>
    </div>
</body>
</html>
