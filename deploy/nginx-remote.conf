# VRChat Media Pipeline - Remote Server nginx Configuration
# 
# Deploy to: /etc/nginx/conf.d/vrchat-pipeline.conf
# Test: nginx -t
# Reload: systemctl reload nginx

# Token validation
map $arg_token $token_valid {
    default 0;
    your_token_here 1;
}

server {
    listen 14515;
    server_name YOUR_SERVER_IP;

    # Landing page — video list with cover cards
    location = / {
        root /var/www/hls;
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # HLS static files — token required
    location /hls/ {
        if ($token_valid = 0) {
            return 403;
        }
        rewrite ^/hls/(.*) /_hls/$1 last;
    }

    location /_hls/ {
        internal;
        alias /var/www/hls/;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "public, max-age=60" always;
    }

    # Disk space info (updated by cron)
    location = /disk.json {
        alias /var/www/hls/disk.json;
        add_header Access-Control-Allow-Origin * always;
        add_header Cache-Control "no-cache" always;
    }
}
