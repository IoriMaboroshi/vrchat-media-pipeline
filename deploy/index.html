<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VRChat BPlayer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.header{background:#16213e;padding:20px 24px;text-align:center;border-bottom:2px solid #fb7299}
.header h1{color:#fb7299;font-size:24px}
.header p{color:#888;font-size:13px;margin-top:4px}
.content{max-width:1200px;margin:0 auto;padding:24px}
#disk-bar{background:#0f3460;border-radius:8px;padding:12px 16px;margin-bottom:20px;display:flex;align-items:center;gap:12px;font-size:13px}
#disk-fill{height:6px;background:linear-gradient(90deg,#fb7299,#ff8db3);border-radius:3px;transition:width .5s}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.card{background:#16213e;border-radius:12px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.3);transition:transform .2s}
.card:hover{transform:translateY(-2px)}
.card .cover{width:100%;height:180px;object-fit:cover;background:#0f3460}
.card .cover-placeholder{width:100%;height:180px;background:linear-gradient(135deg,#0f3460,#16213e);display:flex;align-items:center;justify-content:center;font-size:48px}
.card .info{padding:16px}
.card .title{font-size:15px;font-weight:600;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.4}
.card .meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:#888;margin-bottom:12px}
.card .meta span{background:#0f3460;padding:3px 10px;border-radius:4px}
.card .countdown{font-size:12px;color:#fb7299;margin-bottom:10px}
.card .countdown.expiring{color:#ff6b6b}
.btn-row{display:flex;gap:8px}
.btn{display:inline-block;padding:8px 16px;border-radius:6px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;text-decoration:none}
.btn-play{background:#fb7299;color:#fff;flex:1;text-align:center}
.btn-play:hover{background:#e06080}
.btn-copy{background:transparent;border:1px solid #2a2a4a;color:#aaa;font-size:12px}
.btn-copy:hover{border-color:#fb7299;color:#fb7299}
.empty{text-align:center;padding:80px 20px;color:#666}
.empty h2{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:#888}
.spinner{display:inline-block;width:32px;height:32px;border:3px solid #2a2a4a;border-top-color:#fb7299;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;padding:32px;color:#444;font-size:12px}
.toast{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:8px;font-size:14px;z-index:1000;background:#1b5e20;color:#81c784;box-shadow:0 4px 16px rgba(0,0,0,.3)}
.login-box{background:#16213e;border-radius:12px;padding:32px;text-align:center;width:360px;margin:0 auto}
.login-box h2{color:#fb7299;margin-bottom:8px}
.login-box p{color:#888;font-size:13px;margin-bottom:20px}
.login-box input{width:100%;padding:12px;background:#0f3460;border:1px solid #2a2a4a;border-radius:8px;color:#e0e0e0;font-size:14px;margin-bottom:16px}
.login-box button{width:100%;padding:12px;background:#fb7299;border:none;border-radius:8px;color:#fff;font-size:14px;cursor:pointer;font-weight:500}
.login-error{color:#ef5350;font-size:12px;margin-top:12px;display:none}
</style>
</head>
<body>
<div class="header"><h1>VRChat BPlayer</h1><p>预转码 HLS · 24h自动清理</p></div>

<div id="login-screen" style="display:flex;justify-content:center;align-items:center;min-height:50vh">
<div class="login-box">
<h2>验证访问</h2><p>请输入 Token</p>
<input id="token-input" type="password" placeholder="API Token" onkeydown="if(event.key==='Enter')doLogin()">
<button onclick="doLogin()">验证</button>
<p class="login-error" id="login-error">Token 错误</p>
</div></div>

<div id="main-content" style="display:none">
<div class="content">
<div id="disk-bar">
<span style="color:#888">磁盘</span>
<div style="flex:1;height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden"><div id="disk-fill" style="height:100%;width:0%"></div></div>
<span id="disk-text" style="color:#aaa;white-space:nowrap">加载中...</span>
</div>
<div id="loading" class="loading"><div class="spinner"></div></div>
<div id="grid" class="grid" style="display:none"></div>
<div id="empty" class="empty" style="display:none"><h2>🎬</h2><p>暂无视频</p></div>
</div></div>
<div class="footer">VRCBPP · aliWH1</div>

<script>
var AUTH_TOKEN = '';

(function(){
    var t = new URLSearchParams(window.location.search).get('token');
    var s = sessionStorage.getItem('vrcbpp_token');
    if(t){ AUTH_TOKEN=t; sessionStorage.setItem('vrcbpp_token',t); }
    else if(s){ AUTH_TOKEN=s; }
    if(AUTH_TOKEN) verifyAndLoad();
})();

async function doLogin(){
    var token = document.getElementById('token-input').value.trim();
    if(!token) return;
    try{
        var resp = await fetch('/hls/manifest.json?token='+encodeURIComponent(token));
        if(resp.status===200){
            AUTH_TOKEN=token;
            sessionStorage.setItem('vrcbpp_token',token);
            document.getElementById('login-screen').style.display='none';
            document.getElementById('main-content').style.display='block';
            load();
        }else{
            document.getElementById('login-error').style.display='block';
        }
    }catch(e){
        document.getElementById('login-error').style.display='block';
    }
}

async function verifyAndLoad(){
    try{
        var resp = await fetch('/hls/manifest.json?token='+encodeURIComponent(AUTH_TOKEN));
        if(resp.status===200){
            document.getElementById('login-screen').style.display='none';
            document.getElementById('main-content').style.display='block';
            load();
        }else{
            sessionStorage.removeItem('vrcbpp_token'); AUTH_TOKEN='';
        }
    }catch(e){
        sessionStorage.removeItem('vrcbpp_token'); AUTH_TOKEN='';
    }
}

async function load(){
    // Disk
    try{
        var dr = await fetch('/disk.json');
        var d = await dr.json();
        document.getElementById('disk-fill').style.width = d.pct;
        document.getElementById('disk-text').textContent = d.used+' / '+d.total+' ('+d.pct+')';
    }catch(e){}

    // Videos
    try{
        var resp = await fetch('/hls/manifest.json?token='+encodeURIComponent(AUTH_TOKEN));
        var data = await resp.json();
        var videos = data.videos || [];
        document.getElementById('loading').style.display='none';
        if(videos.length===0){
            document.getElementById('empty').style.display='block';
            return;
        }
        var grid = document.getElementById('grid');
        grid.style.display='grid';
        grid.innerHTML='';
        var now = Date.now()/1000;
        videos.forEach(function(v){
            var card = document.createElement('div');
            card.className='card';
            if(v.cover){
                var img = document.createElement('img');
                img.className='cover'; img.src=v.cover+'@320w_180h'; img.alt=v.title;
                img.onerror=function(){this.replaceWith(placeholder());};
                card.appendChild(img);
            }else{card.appendChild(placeholder());}
            var info = document.createElement('div');
            info.className='info';
            var title = document.createElement('div');
            title.className='title'; title.textContent=v.title||v.bvid;
            info.appendChild(title);
            var meta = document.createElement('div');
            meta.className='meta';
            var dur = v.duration ? Math.floor(v.duration/60)+':'+String(Math.floor(v.duration%60)).padStart(2,'0') : '?';
            meta.innerHTML='<span>'+v.bvid+'</span><span>'+(v.qx||'').toUpperCase()+'</span><span>'+dur+'</span>';
            info.appendChild(meta);
            var cd = document.createElement('div');
            cd.className='countdown';
            var r = (v.expires_at||0)-now;
            cd.textContent = r<=0 ? '已过期' : formatTime(r);
            if(r<3600) cd.className='countdown expiring';
            info.appendChild(cd);
            var btns = document.createElement('div');
            btns.className='btn-row';
            var pu = '/hls/'+v.bvid+'/playlist.m3u8?token='+encodeURIComponent(AUTH_TOKEN);
            btns.innerHTML='<a class="btn btn-play" href="'+pu+'" target="_blank">播放</a><button class="btn btn-copy" onclick="navigator.clipboard.writeText(location.origin+\''+pu+'\').then(function(){var t=document.createElement(\'div\');t.className=\'toast\';t.textContent=\'已复制\';document.body.appendChild(t);setTimeout(function(){t.remove()},2000)})">复制</button>';
            info.appendChild(btns);
            card.appendChild(info);
            grid.appendChild(card);
        });
    }catch(e){
        document.getElementById('loading').style.display='none';
        document.getElementById('empty').style.display='block';
        document.getElementById('empty').innerHTML='<h2>⚠️</h2><p>加载失败: '+e.message+'</p>';
    }
}

function placeholder(){
    var d=document.createElement('div');
    d.className='cover-placeholder'; d.textContent='🎬';
    return d;
}

function formatTime(s){
    var h=Math.floor(s/3600), m=Math.floor((s%3600)/60);
    if(h>0) return h+'小时'+m+'分钟后删除';
    if(m>0) return m+'分钟后删除';
    return Math.floor(s)+'秒后删除';
}
</script>
</body>
</html>
